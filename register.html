<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | Sistema de Tarefas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Sistema de Gerenciamento de Tarefas</h1>
      <h2>Crie sua Conta</h2>
      
      <form action="dashboard.html" method="get">
        <div class="form-group">
          <label for="name">Nome</label>
          <input type="text" id="name" name="name" placeholder="Seu nome completo" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Crie uma senha forte" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Cadastrar</button>
      </form>
      
      <div class="auth-link">
        Já tem uma conta? <a href="index.html">Faça login</a>
      </div>
      <script src="main.js" defer></script>
      <footer>
        © 2026 Projeto Acadêmico
      </footer>
    </div>
  </div>
</body>
</html>
